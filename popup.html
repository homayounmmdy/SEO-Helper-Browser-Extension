<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEO Helper</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="tabs">
      <button class="tab-button" data-tab="overview">Overview</button>
      <button class="tab-button" data-tab="headings">Headings</button>
      <button class="tab-button" data-tab="social">Social</button>
      <button class="tab-button" data-tab="schema">Schema</button>
    </div>

    <div id="overview" class="tab-pane">
      <div class="tab-content">
        <h3>📄 Page insights</h3>
        <div class="info-grid">
          <div class="info-row"><div class="info-label">Title</div><div class="info-value" id="pageTitle">—</div></div>
          <div class="info-row"><div class="info-label">Description</div><div class="info-value" id="pageDescription">—</div></div>
          <div class="info-row"><div class="info-label">URL</div><div class="info-value" id="pageUrl">—</div></div>
          <div class="info-row"><div class="info-label">Canonical</div><div class="info-value" id="canonicalUrl">—</div></div>
        </div>
        <div class="note">✓ SEO essentials</div>
      </div>
    </div>

    <div id="headings" class="tab-pane">
      <div class="tab-content">
        <h3>🔍 Heading hierarchy</h3>
        <ul id="result" class="headings-tree"></ul>
        <div id="headings-status-wrapper">
          <div class="stats-chips" id="stats-chips-container"></div>
        </div>
      </div>
    </div>

    <div id="social" class="tab-pane">
      <div class="tab-content">
        <h3>🕊️ Social & Open Graph</h3>
        <ul id="social-list" class="social-list"></ul>
      </div>
    </div>

    <div id="schema" class="tab-pane">
      <div class="tab-content">
        <h3>📐 Structured data (JSON-LD)</h3>
        <pre id="schema-output" class="schema-block"></pre>
      </div>
    </div>

    <script src="popup.js"></script>

  </body>
</html>
